<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>කාම යහන - Premium Tube</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: transparent; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #050507; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        .loader-circle { width: 100px; height: 100px; border: 4px solid #1a1a24; border-top: 4px solid #ffaa00; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 20px rgba(255, 170, 0, 0.2); }
        .loader-text { margin-top: 20px; font-size: 24px; font-weight: bold; color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bg-bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #060608; }
        .bubble { position: absolute; bottom: -100px; width: 40px; height: 40px; background: rgba(255, 170, 0, 0.3); border-radius: 50%; animation: rise 15s infinite ease-in; pointer-events: none; }
        .bubble:nth-child(1) { left: 10%; width: 60px; height: 60px; animation-duration: 12s; }
        .bubble:nth-child(2) { left: 25%; width: 20px; height: 20px; animation-duration: 18s; animation-delay: 2s; }
        .bubble:nth-child(3) { left: 45%; width: 50px; height: 50px; animation-duration: 14s; }
        .bubble:nth-child(4) { left: 65%; width: 30px; height: 30px; animation-duration: 20s; }
        .bubble:nth-child(5) { left: 85%; width: 70px; height: 70px; animation-duration: 10s; }
        .bubble:nth-child(6) { left: 50%; width: 25px; height: 25px; animation-duration: 16s; }
        
        @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: translateY(-100vh); opacity: 0; } }
        
        #age-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 7, 0.85); z-index: 9998; display: none; justify-content: center; align-items: center; backdrop-filter: blur(25px); }
        .age-gate-box { background: linear-gradient(135deg, #14141f 0%, #0d0d14 100%); border: 2px solid #ffaa00; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 0 40px rgba(255, 170, 0, 0.3); max-width: 450px; width: 90%; }
        .age-gate-box h2 { color: #ffaa00; font-weight: bold; margin-bottom: 15px; }
        .btn-enter { background-color: #ffaa00; color: #000; font-weight: bold; padding: 12px 30px; border-radius: 8px; border: none; margin-right: 10px; transition: 0.3s; }
        .btn-enter:hover { background-color: #ffffff; box-shadow: 0 0 15px #ffffff; }
        .btn-exit { background-color: transparent; color: #ff3333; font-weight: bold; padding: 12px 30px; border-radius: 8px; border: 2px solid #ff3333; transition: 0.3s; }
        .btn-exit:hover { background-color: #ff3333; color: #fff; box-shadow: 0 0 15px #ff3333; }
        
        .navbar { background: rgba(13, 13, 20, 0.8) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 170, 0, 0.2); }
        .navbar-brand { font-weight: 900; letter-spacing: 1px; font-size: 26px; }
        .brand-premium { background: linear-gradient(90deg, #ff9900, #ffcc00); color: #000000; padding: 3px 10px; border-radius: 6px; margin-left: 6px; box-shadow: 0 0 15px rgba(255, 153, 0, 0.5); }
        
        .search-section { max-width: 600px; margin: 30px auto; padding: 0 15px; }
        .search-inner { position: relative; border-radius: 30px; padding: 2px; background: linear-gradient(90deg, #ffaa00, #00ffcc); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .search-input { width: 100%; border: none; padding: 12px 25px; background: #0f0f17; color: #fff; border-radius: 30px; outline: none; font-size: 16px; }
        .search-inner i { position: absolute; right: 20px; top: 15px; color: #00ffcc; font-size: 18px; }

        .category-bar { background-color: #0d0d14; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); overflow-x: auto; white-space: nowrap; text-align: center; }
        .category-btn { background-color: #161622; color: #aaaaaa; border: 1px solid rgba(255,255,255,0.05); padding: 8px 25px; margin-right: 10px; border-radius: 20px; font-size: 14px; transition: 0.3s; cursor: pointer; }
        .category-btn:hover, .category-btn.active { background-color: #ffaa00; color: #000; box-shadow: 0 0 15px rgba(255, 170, 0, 0.4); border-color: #ffaa00; font-weight: bold; }

        .video-card { background: #0f0f17; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; overflow: hidden; margin-bottom: 30px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .video-card:hover { transform: translateY(-10px) scale(1.02); border-color: #ffaa00; box-shadow: 0 10px 30px rgba(255, 170, 0, 0.15); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .thumb-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; cursor: pointer; z-index: 2; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
        .play-btn { width: 60px; height: 60px; background: rgba(255, 170, 0, 0.9); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(255, 170, 0, 0.6); transition: 0.3s; }
        .play-btn i { color: #000; font-size: 22px; margin-left: 4px; }
        .video-card:hover .play-btn { transform: scale(1.1); background: #ffffff; box-shadow: 0 0 25px #ffffff; }
        
        .badge-hd { position: absolute; top: 12px; left: 12px; background: linear-gradient(90deg, #00f2fe, #4facfe); color: #fff; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 4px; z-index: 3; }
        .badge-time { position: absolute; bottom: 12px; right: 12px; background: rgba(0, 0, 0, 0.8); color: #fff; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; z-index: 3; }

        .video-info { padding: 15px; background: #0f0f17; }
        .video-title { font-size: 15px; font-weight: bold; color: #ffffff; line-height: 1.4; height: 42px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; }
        .video-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: 5px; }
        .action-btn { background: none; border: none; color: #6c757d; font-size: 13px; transition: 0.2s; cursor: pointer; }
        .action-btn:hover, .action-btn.active-like { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .action-btn.active-dislike { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.4); }
        .video-meta { font-size: 12px; color: #5c5c70; font-weight: 500; }

        #notification-toast { position: fixed; bottom: 20px; left: 20px; background: linear-gradient(135deg, #10101a 0%, #07070a 100%); border: 1px solid #00ffcc; padding: 15px 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); z-index: 9995; display: flex; align-items: center; gap: 12px; transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #notification-toast i { color: #00ffcc; font-size: 20px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="bg-bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div id="preloader"><div class="loader-circle"></div><div class="loader-text" id="loader-percentage">0%</div></div>
    <div id="age-gate"><div class="age-gate-box"><h2>⚠️ WARNING: 18+ ONLY</h2><p>This website contains adult content. You must be 18+.</p><div class="mt-4"><button class="btn-enter" onclick="enterSite()">ENTER (18+)</button><button class="btn-exit" onclick="exitSite()">EXIT</button></div></div></div>

    <div id="notification-toast"><i class="fa-solid fa-circle-bolt"></i><div id="notification-text" style="font-size: 13px; font-weight: 500;"></div></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top"><div class="container"><a class="navbar-brand" href="#">කාම<span class="brand-premium">YAHANA</span></a></div></nav>

    <div class="search-section">
        <div class="search-inner">
            <input type="text" id="search-input" class="search-input" placeholder="Search premium videos..." onkeyup="searchVideos()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>

    <div class="category-bar">
        <div class="container">
            <button class="category-btn active" onclick="filterVideos('all', this)">All Videos</button>
            <button class="category-btn" onclick="filterVideos('srilankan', this)">Sri Lankan🇱🇰</button>
            <button class="category-btn" onclick="filterVideos('outdoor', this)">Outdoor🇱🇰</button>
        </div>
    </div>

    <div class="container my-4">
        <h3 class="mb-4"><i class="fa-solid fa-bolt text-warning me-2"></i>Recommended</h3>
        <div class="row" id="video-grid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTsuW5Ib2FJ1k6ZuykeJotdIS0qU68JrI",
            authDomain: "kamayahana-35572.firebaseapp.com",
            projectId: "kamayahana-35572",
            storageBucket: "kamayahana-35572.firebasestorage.app",
            databaseURL: "https://kamayahana-35572-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/19fRcgFz3BE41d8gREOzR7mOgl53d6SYyWcY3iyuO4PI/gviz/tq?tqx=out:json`;

        document.addEventListener("DOMContentLoaded", () => {
            fetch(SPREADSHEET_URL)
                .then(res => res.text())
                .then(data => {
                    const jsonData = JSON.parse(data.substring(47, data.length - 2));
                    renderVideos(jsonData.table.rows);
                    document.getElementById("preloader").style.display = "none";
                    document.getElementById("age-gate").style.display = "flex";
                });
        });

        function getThumbnail(videoUrl, sheetThumb) {
            if (sheetThumb && sheetThumb.trim() !== "") return sheetThumb;
            let doodIdMatch = videoUrl.match(/\/(?:d|e)\/([a-zA-Z0-9]+)/);
            return doodIdMatch ? `https://img.doodcdn.co/snaps/${doodIdMatch[1]}.jpg` : "https://via.placeholder.com/640x360";
        }

        function renderVideos(rows) {
            let gridHtml = '';
            rows.forEach((row, index) => {
                const title = row.c[0]?.v || 'Untitled';
                const link = row.c[1]?.v || '#';
                const cat = row.c[2]?.v.toLowerCase() || 'all';
                const duration = row.c[3]?.v || 'HD';
                const sheetThumb = row.c[4]?.v || "";
                const thumb = getThumbnail(link, sheetThumb);
                const videoId = "card_" + index;
                
                gridHtml += `<div class="col-lg-4 col-md-6 video-item ${cat}">
                    <div class="video-card" id="card-${videoId}">
                        <div class="video-container">
                            <div class="thumb-overlay" id="thumb-${index}" style="background-image: url('${thumb}');" onclick="playVideo('${link}', 'player-${index}', 'thumb-${index}', '${videoId}')">
                                <div class="play-btn"><i class="fa-solid fa-play"></i></div>
                            </div>
                            <iframe id="player-${index}" src="" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${title}</div>
                            <div class="video-actions">
                                <button class="action-btn btn-like" onclick="toggleLike('${videoId}', this)"><i class="fa-solid fa-thumbs-up"></i> <span>0</span></button>
                                <button class="action-btn btn-dislike" onclick="toggleDislike('${videoId}', this)"><i class="fa-solid fa-thumbs-down"></i> <span>0</span></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('video-grid').innerHTML = gridHtml;
            syncAllStats();
        }

        function playVideo(url, pId, tId, vId) {
            document.getElementById(pId).src = url;
            document.getElementById(tId).style.display = 'none';
            database.ref('v_stats/' + vId + '/views').transaction(c => (c || 0) + 1);
        }

        function toggleLike(vId, btn) {
            const ref = database.ref('v_stats/' + vId + '/likes');
            btn.classList.toggle('active-like');
            ref.transaction(c => btn.classList.contains('active-like') ? (c || 0) + 1 : (c || 1) - 1);
        }

        function toggleDislike(vId, btn) {
            const ref = database.ref('v_stats/' + vId + '/dislikes');
            btn.classList.toggle('active-dislike');
            ref.transaction(c => btn.classList.contains('active-dislike') ? (c || 0) + 1 : (c || 1) - 1);
        }

        function syncAllStats() {
            database.ref('v_stats').on('value', (snap) => {
                snap.forEach((child) => {
                    const card = document.getElementById(`card-${child.key}`);
                    if (card) {
                        card.querySelector('.btn-like span').innerText = child.val().likes || 0;
                        card.querySelector('.btn-dislike span').innerText = child.val().dislikes || 0;
                    }
                });
            });
        }
        
        function enterSite() { document.getElementById("age-gate").style.display = "none"; }
        function exitSite() { window.location.href = "https://www.google.com"; }
        function filterVideos(cat, btn) {
            document.querySelectorAll('.video-item').forEach(i => i.style.display = (cat === 'all' || i.classList.contains(cat)) ? 'block' : 'none');
        }
    </script>
</body>
</html>
