        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #050507; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        .loader-circle { width: 100px; height: 100px; border: 4px solid #1a1a24; border-top: 4px solid #ffaa00; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 20px rgba(255, 170, 0, 0.2); }

.bg-bubbles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    background: #060608; /* මුළු පිටුවටම කළු පසුබිම මෙතනින් දෙන්න */
}

.bubble {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 40px;
    background: rgba(255, 170, 0, 0.3); /* 0.1 වෙනුවට 0.3 කරන්න */
    border-radius: 50%;
    animation: rise 15s infinite ease-in;
    pointer-events: none;
}

/* බුබුලු විවිධ ප්‍රමාණවලින් සහ ස්ථානවලින් මතුවීමට */
.bubble:nth-child(1) { left: 10%; width: 60px; height: 60px; animation-duration: 12s; }
.bubble:nth-child(2) { left: 25%; width: 20px; height: 20px; animation-duration: 18s; animation-delay: 2s; }
.bubble:nth-child(3) { left: 45%; width: 50px; height: 50px; animation-duration: 14s; }
.bubble:nth-child(4) { left: 65%; width: 30px; height: 30px; animation-duration: 20s; }
.bubble:nth-child(5) { left: 85%; width: 70px; height: 70px; animation-duration: 10s; }
.bubble:nth-child(6) { left: 50%; width: 25px; height: 25px; animation-duration: 16s; }

@keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    50% { opacity: 0.4; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
        
        #age-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 7, 0.85); z-index: 9998; display: none; justify-content: center; align-items: center; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .age-gate-box { background: linear-gradient(135deg, #14141f 0%, #0d0d14 100%); border: 2px solid #ffaa00; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 0 40px rgba(255, 170, 0, 0.3); max-width: 450px; width: 90%; }
        .age-gate-box h2 { color: #ffaa00; font-weight: bold; margin-bottom: 15px; }
        .btn-enter { background-color: #ffaa00; color: #000; font-weight: bold; padding: 12px 30px; border-radius: 8px; border: none; margin-right: 10px; transition: 0.3s; }
        .btn-enter:hover { background-color: #ffffff; box-shadow: 0 0 15px #ffffff; }

        .btn-exit:hover { background-color: #ff3333; color: #fff; box-shadow: 0 0 15px #ff3333; }
        
        .navbar { background: rgba(13, 13, 20, 0.8) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 170, 0, 0.2); }

}

.video-card:hover {

}

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .thumb-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; cursor: pointer; z-index: 2; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
        .play-btn { width: 60px; height: 60px; background: rgba(255, 170, 0, 0.9); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(255, 170, 0, 0.6); transition: 0.3s; }

        .badge-hd { position: absolute; top: 12px; left: 12px; background: linear-gradient(90deg, #00f2fe, #4facfe); color: #fff; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 4px; z-index: 3; }
        .badge-time { position: absolute; bottom: 12px; right: 12px; background: rgba(0, 0, 0, 0.8); color: #fff; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; z-index: 3; }

        .video-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: 5px; }
        .action-btn { background: none; border: none; color: #6c757d; font-size: 13px; transition: 0.2s; cursor: pointer; }
        .action-btn:hover, .action-btn.active-like { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .action-btn.active-dislike { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.4); }
        .video-meta { font-size: 12px; color: #5c5c70; font-weight: 500; }

        .ads-banner { text-align: center; margin: 30px 0; min-height: 90px; }
        #notification-toast { position: fixed; bottom: 20px; left: 20px; background: linear-gradient(135deg, #10101a 0%, #07070a 100%); border: 1px solid #00ffcc; padding: 15px 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); z-index: 9995; display: flex; align-items: center; gap: 12px; transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #notification-toast i { color: #00ffcc; font-size: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }


@keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    50% { opacity: 0.5; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

<body>

        <div class="bg-bubbles">

    <div class="search-section">
        <div class="search-inner">
            <input type="text" id="search-input" class="search-input" placeholder="Search premium videos here..." onkeyup="searchVideos()">
            <i class="fa-solid fa-magnifying-glass"></i>

    <div class="category-bar">
        <div class="container">
            <button class="category-btn active" onclick="filterVideos('all', this)">All Videos🍆</button>
            <button class="category-btn" onclick="filterVideos('srilankan', this)">Sri Lankan🇱🇰</button>
            <button class="category-btn" onclick="filterVideos('outdoor', this)">Outdoor Leek🇱🇰</button>
            <button class="category-btn" onclick="filterVideos('country', this)">Any Country🌎</button>

    <div class="container my-4">

        <h3 class="mb-4" style="font-weight: 800; letter-spacing: 0.5px; font-size: 20px;"><i class="fa-solid fa-bolt text-warning me-2"></i>AI Recommended Videos</h3>
        <div class="row" id="video-grid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTsuW5Ib2FJ1k6ZuykeJotdIS0qU68JrI",
            authDomain: "kamayahana-35572.firebaseapp.com",
            projectId: "kamayahana-35572",
            storageBucket: "kamayahana-35572.firebasestorage.app",
            messagingSenderId: "432931168383",
            appId: "1:432931168383:web:2b17621ab16f801adb5f4a",
            databaseURL: "https://kamayahana-35572-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const SPREADSHEET_ID = '19fRcgFz3BE41d8gREOzR7mOgl53d6SYyWcY3iyuO4PI'; 
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        let allVideoData = []; 

        document.addEventListener("DOMContentLoaded", function() {
            let percentageText = document.getElementById("loader-percentage");
            let preloader = document.getElementById("preloader");
            let ageGate = document.getElementById("age-gate");
            let count = 0;
            let counterInterval = setInterval(() => {
                count += 5;
                if (count > 100) count = 100;
                percentageText.innerText = count + "%";
                if (count === 100) { clearInterval(counterInterval); }
            }, 25);

            fetch(SPREADSHEET_URL)
                .then(res => res.text())
                .then(data => {
                    const jsonData = JSON.parse(data.substring(47, data.length - 2));
                    allVideoData = jsonData.table.rows;
                    renderVideos(allVideoData);
                    
                    preloader.style.opacity = "0";
                    setTimeout(() => { preloader.style.display = "none"; ageGate.style.display = "flex"; }, 500);
                    setTimeout(startLiveNotifications, 5000);
                });
        });

        // 🛠️ FIX: playmogo.com ඇතුළු ඕනෑම DoodStream Alternative Domain එකකින් ID එක නිවැරදිව වෙන් කරගන්නා ලෙස Regex එක වෙනස් කලා.
        function getDoodStreamThumbnail(videoUrl) {
            let thumb = "https://via.placeholder.com/640x360/0f0f17/ffaa00?text=Premium+Video"; 
            let doodIdMatch = videoUrl.match(/\/(?:d|e)\/([a-zA-Z0-9]+)/);
            
            if (doodIdMatch && doodIdMatch[1]) {
                let videoId = doodIdMatch[1];
                thumb = `https://img.doodcdn.co/snaps/${videoId}.jpg`;
            }
            return thumb;
        }

        function renderVideos(rows) {
    let gridHtml = '';
    rows.forEach((row, index) => {
        const title = row.c[0] ? row.c[0].v : 'Untitled Premium Video';
        const link = row.c[1] ? row.c[1].v : '#';
        
        // මෙතනදී category එක split කරලා classes ටික ගන්නවා
        const rawCategory = row.c[2] ? row.c[2].v.toLowerCase() : 'all';
        const categoryArray = rawCategory.split(',').map(c => c.trim());
        const categoryClasses = categoryArray.join(' ');
        
        const duration = row.c[3] ? row.c[3].v : 'HD';
        const thumb = getDoodStreamThumbnail(link);
        const videoId = "card_" + index; 
        
        // මෙතන "${categoryClasses}" ලෙස වෙනස් කළා
        gridHtml += `
            <div class="col-lg-4 col-md-6 video-item ${categoryClasses}">
                <div class="video-card" id="card-${videoId}">
                    <div class="video-container">
                        <div class="badge-hd"><i class="fa-solid fa-bolt me-1"></i>PREMIUM HD</div>
                        <div class="badge-time">${duration}</div>
                        <div class="thumb-overlay" id="thumb-${index}" style="background-image: url('${thumb}');" onclick="playVideo('${link}', 'player-${index}', 'thumb-${index}', '${videoId}')">
                            <div class="play-btn"><i class="fa-solid fa-play"></i></div>
                        </div>
                        <iframe id="player-${index}" src="" frameborder="0" allowfullscreen scrolling="no"></iframe>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${title}</div>
                        <div class="video-meta"><i class="fa-solid fa-eye me-1"></i><span class="v-count">0</span> Views</div>
                        <div class="video-actions">
                            <button class="action-btn btn-like" onclick="toggleLike('${videoId}', this)"><i class="fa-solid fa-thumbs-up me-1"></i><span>0</span></button>
                            <button class="action-btn btn-dislike" onclick="toggleDislike('${videoId}', this)"><i class="fa-solid fa-thumbs-down me-1"></i><span>0</span></button>
                            <button class="action-btn" onclick="shareVideo('${title}', '${link}')"><i class="fa-solid fa-share-nodes"></i> Share</button>
                        </div>
                    </div>
                </div>
            </div>`;
    });
    document.getElementById('video-grid').innerHTML = gridHtml || '<p>No videos found.</p>';
    syncAllStats(); 
}

                

        function playVideo(videoUrl, playerId, thumbId, videoId) {
            document.getElementById(playerId).src = videoUrl;
            document.getElementById(thumbId).style.opacity = '0';
            setTimeout(() => { document.getElementById(thumbId).style.display = 'none'; }, 300);

            database.ref('v_stats/' + videoId + '/views').transaction((currentViews) => {
                return (currentViews || 0) + 1;
            });
        }

        function toggleLike(vId, btn) {
    console.log("Like clicked for ID:", vId); // මේකෙන් බලන්න හරියට ID එක එනවද කියලා
    
    // Database reference එකට අනිවාර්යයෙන්ම vId එක යන්න ඕනේ
    const ref = database.ref('v_stats/' + vId + '/likes');
    
    if(btn.classList.contains('active-like')) {
        btn.classList.remove('active-like');
        ref.transaction(c => (c || 1) - 1);
    } else {
        btn.classList.add('active-like');
        ref.transaction(c => (c || 0) + 1);
    }
}

        function toggleDislike(vId, btn) {
    const ref = database.ref('v_stats/' + vId + '/dislikes');
    
    if(btn.classList.contains('active-dislike')) {
        btn.classList.remove('active-dislike');
        ref.transaction(c => (c || 1) - 1);
    } else {
        btn.classList.add('active-dislike');
        ref.transaction(c => (c || 0) + 1);
        
        // Dislike කරනකොට Like එක ඉවත් කරන්න
        let lBtn = btn.previousElementSibling;
        if(lBtn.classList.contains('active-like')) {
            lBtn.classList.remove('active-like');
            database.ref('v_stats/' + vId + '/likes').transaction(c => (c || 1) - 1);
        }
    }
}
        function searchVideos() {
            let query = document.getElementById('search-input').value.toLowerCase();
            let items = document.querySelectorAll('.video-item');
            items.forEach(item => {
                let title = item.querySelector('.video-title').innerText.toLowerCase();
                item.style.display = title.includes(query) ? 'block' : 'none';
            });
        }

        function shareVideo(title, url) {
            if (navigator.share) { navigator.share({ title: title, url: url }).catch(console.error); } 
            else { alert("Link copied to clipboard!"); }
        }

        function filterVideos(category, buttonElement) {
    let buttons = document.querySelectorAll('.category-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    let items = document.querySelectorAll('.video-item');
    items.forEach(item => {
        if (category === 'all') { 
            item.style.display = 'block'; 
        } else {
            // item එකට අදාළ class එක තියෙනවද කියලා බලනවා
            item.style.display = item.classList.contains(category) ? 'block' : 'none';
        }
    });
    document.getElementById('search-input').value = ''; 
}

        // Age Gate logic
        function enterSite() {
            let ageGate = document.getElementById("age-gate");
            ageGate.style.opacity = "0";
            setTimeout(() => { ageGate.style.display = "none"; }, 400);
        }
        function exitSite() { window.location.href = "https://www.google.com"; }

        function startLiveNotifications() {
            const locations = ['Colombo', 'Kandy', 'Galle', 'Gampaha', 'Negombo', 'Kurunegala', 'Jaffna', 'Matara', 'Kalutara'];
            const actions = ['unlocked Premium Mode!', 'is watching Live right now.', 'liked a Sri Lankan Leaked video.', 'downloaded full HD pack.'];
            const toast = document.getElementById('notification-toast');
            const toastText = document.getElementById('notification-text');

            setInterval(() => {
                let randomLoc = locations[Math.floor(Math.random() * locations.length)];
                let randomAct = actions[Math.floor(Math.random() * actions.length)];
                let randomUsers = Math.floor(Math.random() * 150) + 200;

                if(Math.random() > 0.5) {
                    toastText.innerHTML = `Someone from <b class="text-warning">${randomLoc}</b> ${randomAct}`;
                } else {
                    toastText.innerHTML = `<b class="text-info">${randomUsers} users</b> are browsing this section right now.`;
                }

                toast.style.transform = 'translateY(0%)';
                setTimeout(() => { toast.style.transform = 'translateY(150%)'; }, 4000);
            }, 12000); 
        }
        function syncAllStats() {
    database.ref('v_stats').on('value', (snapshot) => {
        snapshot.forEach((childSnapshot) => {
            const vId = childSnapshot.key; // මේක තමයි database එකේ තියෙන ID එක
            const data = childSnapshot.val();
            
            const card = document.getElementById(`card-${vId}`);
            if (card) {
                card.querySelector('.v-count').innerText = data.views || 0;
                card.querySelector('.btn-like span').innerText = data.likes || 0;
                card.querySelector('.btn-dislike span').innerText = data.dislikes || 0;
            }
        });
    });
}
    </script>
