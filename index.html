<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>කාම යහන - AI Premium Tube</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #08080a; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #050507; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        .loader-circle { width: 100px; height: 100px; border: 4px solid #1a1a24; border-top: 4px solid #ffaa00; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 20px rgba(255, 170, 0, 0.2); }
        .loader-text { margin-top: 20px; font-size: 24px; font-weight: bold; color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #age-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 7, 0.85); z-index: 9998; display: none; justify-content: center; align-items: center; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .age-gate-box { background: linear-gradient(135deg, #14141f 0%, #0d0d14 100%); border: 2px solid #ffaa00; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 0 40px rgba(255, 170, 0, 0.3); max-width: 450px; width: 90%; }
        .age-gate-box h2 { color: #ffaa00; font-weight: bold; margin-bottom: 15px; }
        .btn-enter { background-color: #ffaa00; color: #000; font-weight: bold; padding: 12px 30px; border-radius: 8px; border: none; margin-right: 10px; transition: 0.3s; }
        .btn-enter:hover { background-color: #ffffff; box-shadow: 0 0 15px #ffffff; }
        .btn-exit { background-color: transparent; color: #ff3333; font-weight: bold; padding: 12px 30px; border-radius: 8px; border: 2px solid #ff3333; transition: 0.3s; }
        .btn-exit:hover { background-color: #ff3333; color: #fff; box-shadow: 0 0 15px #ff3333; }
        .navbar { background: rgba(13, 13, 20, 0.8) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 170, 0, 0.2); }
        .navbar-brand { font-weight: 900; letter-spacing: 1px; font-size: 26px; }
        .brand-premium { background: linear-gradient(90deg, #ff9900, #ffcc00); color: #000000; padding: 3px 10px; border-radius: 6px; margin-left: 6px; box-shadow: 0 0 15px rgba(255, 153, 0, 0.5); }
        .category-bar { background-color: #0d0d14; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); overflow-x: auto; white-space: nowrap; }
        .category-btn { background-color: #161622; color: #aaaaaa; border: 1px solid rgba(255,255,255,0.05); padding: 8px 20px; margin-right: 10px; border-radius: 20px; font-size: 14px; text-decoration: none; display: inline-block; transition: 0.3s; cursor: pointer; }
        .category-btn:hover, .category-btn.active { background-color: #ffaa00; color: #000; box-shadow: 0 0 15px rgba(255, 170, 0, 0.4); border-color: #ffaa00; }
        .video-card { background: #0f0f17; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; overflow: hidden; margin-bottom: 30px; position: relative; animation: float 4s ease-in-out infinite; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s, box-shadow 0.4s; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
        .video-card:hover { animation-play-state: paused; transform: scale(1.04) translateY(-5px) !important; border-color: #00ffcc; box-shadow: 0 0 25px rgba(0, 255, 204, 0.6), 0 0 50px rgba(255, 170, 0, 0.2); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .video-info { padding: 15px; background: #0f0f17; }
        .video-title { font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 8px; }
        .video-meta { font-size: 13px; color: #77778e; }
        .ads-banner { background: #0d0d14; border: 1px dashed #ffaa00; text-align: center; padding: 25px; margin: 30px 0; color: #ffaa00; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 170, 0, 0.1); }
    </style>
</head>
<body>

    <div id="preloader"><div class="loader-circle"></div><div class="loader-text" id="loader-percentage">0%</div></div>
    <div id="age-gate"><div class="age-gate-box"><h2>⚠️ WARNING: 18+ ONLY</h2><p class="text-muted">This website contains adult content. You must be 18 years or older to enter.</p><hr style="border-color: rgba(255,170,0,0.2);"><div class="mt-4"><button class="btn-enter" onclick="enterSite()">ENTER (18+)</button><button class="btn-exit" onclick="exitSite()">EXIT</button></div></div></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top"><div class="container"><a class="navbar-brand" href="#">කාම<span class="brand-premium">YAHANA AI</span></a></div></nav>

    <div class="category-bar">
        <div class="container">
            <button class="category-btn active" onclick="filterVideos('all', this)">All Videos</button>
            <button class="category-btn" onclick="filterVideos('srilankan', this)">Sri Lankan</button>
            <button class="category-btn" onclick="filterVideos('amateur', this)">Amateur</button>
            <button class="category-btn" onclick="filterVideos('leaked', this)">Leaked</button>
        </div>
    </div>

    <div class="container my-5">
        <div class="ads-banner">[ ADSTERRA / EXOCLICK BANNER PLACEHOLDER ]</div>
        <h3 class="mb-4" style="font-weight: 800; letter-spacing: 0.5px;">⚡ AI Recommended Videos</h3>
        
        <!-- මෙතනට තමයි Google Sheet එකෙන් වීඩියෝ ඔටෝමැටිකලි ලෝඩ් වෙන්නේ -->
        <div class="row" id="video-grid"></div>
    </div>

    <script>
        // 🛑 මෙතනට උඹේ GOOGLE SHEET ID එක දාන්න 🛑
        const SPREADSHEET_ID = '19fRcgFz3BE41d8gREOzR7mOgl53d6SYyWcY3iyuO4PI'; 
        
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        document.addEventListener("DOMContentLoaded", function() {
            // 1. Loading Screen Counter
            let percentageText = document.getElementById("loader-percentage");
            let preloader = document.getElementById("preloader");
            let ageGate = document.getElementById("age-gate");
            let count = 0;
            let counterInterval = setInterval(() => {
                count += 5;
                if (count > 100) count = 100;
                percentageText.innerText = count + "%";
                if (count === 100) { clearInterval(counterInterval); }
            }, 30);

            // 2. Fetch Data From Google Sheet
            fetch(SPREADSHEET_URL)
                .then(res => res.text())
                .then(data => {
                    // Google JSON format එක පිරිසිදු කිරීම
                    const jsonData = JSON.parse(data.substring(47, data.length - 2));
                    const rows = jsonData.table.rows;
                    let gridHtml = '';

                    rows.forEach((row, index) => {
                        const title = row.c[0] ? row.c[0].v : 'Untitled Video';
                        const link = row.c[1] ? row.c[1].v : '#';
                        const category = row.c[2] ? row.c[2].v.toLowerCase().trim() : 'all';

                        gridHtml += `
                            <div class="col-lg-4 col-md-6 video-item ${category}" style="animation-delay: ${index * 0.2}s">
                                <div class="video-card">
                                    <div class="video-container">
                                        <iframe src="${link}" frameborder="0" allowfullscreen></iframe>
                                    </div>
                                    <div class="video-info">
                                        <div class="video-title">${title}</div>
                                        <div class="video-meta">🟢 ${Math.floor(Math.random() * 10) + 1}K Views • Premium AI</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('video-grid').innerHTML = gridHtml;
                    
                    // Loading ඉවර කරලා සයිට් එක පෙන්වීම
                    preloader.style.opacity = "0";
                    setTimeout(() => { preloader.style.display = "none"; ageGate.style.display = "flex"; }, 500);
                })
                .catch(err => {
                    console.error("Error loading videos:", err);
                    document.getElementById('video-grid').innerHTML = '<p class="text-danger">Failed to load videos. Check Sheet ID or Publish settings.</p>';
                    preloader.style.display = "none";
                    ageGate.style.display = "flex";
                });
        });

        function enterSite() {
            let ageGate = document.getElementById("age-gate");
            ageGate.style.opacity = "0";
            setTimeout(() => { ageGate.style.display = "none"; }, 400);
        }

        function exitSite() { window.location.href = "https://www.google.com"; }

        function filterVideos(category, buttonElement) {
            let buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            let items = document.querySelectorAll('.video-item');
            items.forEach(item => {
                if (category === 'all') { item.style.display = 'block'; } 
                else { item.style.display = item.classList.contains(category) ? 'block' : 'none'; }
            });
        }
    </script>
</body>
</html>
